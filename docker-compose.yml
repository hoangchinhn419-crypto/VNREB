services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vnreb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [vnreb_pgdata:/var/lib/postgresql/data
]
  web:
    build: .
    ports: ["3000:3000"]
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vnreb
      JWT_SECRET: local-secret
      ADMIN_SETUP_CODE: VNREB-ADMIN-LOCAL
    depends_on: [postgres]
volumes:
  vnreb_pgdata:
