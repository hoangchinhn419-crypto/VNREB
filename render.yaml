databases:
  - name: vnreb-postgres
    plan: basic-256mb
    databaseName: vnreb
    user: vnreb
services:
  - type: web
    name: vnreb-platform
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vnreb-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SETUP_CODE
        sync: false
      - key: NEXT_PUBLIC_VIETMAP_STYLE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
